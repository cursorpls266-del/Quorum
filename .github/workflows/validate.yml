name: Validate Agent

on:
  pull_request:
    paths:
      - 'RULES.md'
      - 'SOUL.md'
      - 'DUTIES.md'
      - 'agent.yaml'
      - 'skills/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @shreyaskapale/gitagent
      - run: gitagent validate
